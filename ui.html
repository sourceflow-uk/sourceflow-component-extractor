<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { color-scheme: dark; }

  :root {
    --purple:       #4542FF;
    --purple-light: #D2D1FF;
    --purple-bg:    #13133A;
    --dark:         #E8E8FF;
    --muted:        #6464A0;
    --bg:           #07071A;
    --white:        #0E0E24;
    --border:       #1C1C42;
    --radius:       8px;
    --shadow:       0 2px 8px rgba(0,0,0,.6), 0 8px 24px rgba(0,0,0,.35);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(ellipse 600px 300px at 50% -60px, rgba(69,66,255,0.16) 0%, transparent 70%);
    color: var(--dark);
    min-height: 100vh;
    padding: 24px 16px;
    font-size: 13px;
    line-height: 1.5;
  }

  .app {
    max-width: 380px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    margin-bottom: 24px;
  }
  .header__logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .header__dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--purple);
    box-shadow: 0 0 10px rgba(69,66,255,0.7);
    flex-shrink: 0;
  }
  .header__title {
    font-size: 14px;
    font-weight: 600;
    color: var(--purple-light);
    letter-spacing: -0.01em;
  }
  .header__sub {
    font-size: 12px;
    color: var(--muted);
    padding-left: 20px;
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 24px;
  }

  /* ── Field ── */
  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }
  .field__label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 6px;
  }
  .field__input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    color: var(--dark);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }
  .field__input:focus { border-color: var(--purple); }
  .field__input::placeholder { color: var(--muted); }

  /* ── Hint ── */
  .hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .hint strong { color: var(--dark); font-weight: 500; }

  /* ── Button ── */
  .btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: var(--purple);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s, transform .1s;
    font-family: inherit;
  }
  .btn:hover { background: #5552FF; }
  .btn:active { transform: scale(.98); }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header__logo">
      <div class="header__dot"></div>
      <span class="header__title">SourceFlow Component Extractor</span>
    </div>
    <div class="header__sub">Extract components from a Figma file</div>
  </div>

  <div class="card">
    <p class="hint">Right click the Figma tab above &gt; <strong>Copy Link</strong>, then paste the URL below.</p>
    <div class="field">
      <label class="field__label" for="url">Figma URL</label>
      <input id="url" class="field__input" type="text" placeholder="https://www.figma.com/design/XXXX/Your-File-Name" autocomplete="off" />
    </div>
    <button id="submit" class="btn">Extract Components</button>
  </div>

</div>

<script>
  document.getElementById("submit").onclick = () => {
    const url = document.getElementById("url").value;
    parent.postMessage({ pluginMessage: { type: "file-url", url } }, "*");
  };

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (msg.type === "download-csv") {
      const blob = new Blob([msg.data], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = msg.fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      parent.postMessage({ pluginMessage: { type: "close" } }, "*");
    }
  };
</script>
</body>
</html>
